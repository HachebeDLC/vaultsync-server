version: '3.8'

services:
  vaultsync:
    build: .
    container_name: vaultsync_server
    restart: unless-stopped
    ports:
      - "8080:8000"
    environment:
      - DB_HOST=db
      - DB_NAME=vaultsync
      - DB_USER=vaultsync
      - DB_PASS=vaultsync_secure_password
      - VAULTSYNC_SECRET=REPLACE_WITH_YOUR_OWN_SECRET_KEY
    volumes:
      - ./storage:/app/storage
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: vaultsync_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=vaultsync
      - POSTGRES_USER=vaultsync
      - POSTGRES_PASSWORD=vaultsync_secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
