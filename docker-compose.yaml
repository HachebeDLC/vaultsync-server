services:
  vaultsync:
    build: .
    container_name: vaultsync_server
    restart: unless-stopped
    ports:
      - "5436:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_NAME=vaultsync
      - DB_USER=vaultsync
      - DB_PASS=vaultsync_secure_password
      - REDIS_HOST=redis
    volumes:
      - ./storage:/app/storage
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    container_name: vaultsync_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=vaultsync
      - POSTGRES_USER=vaultsync
      - POSTGRES_PASSWORD=vaultsync_secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vaultsync_redis
    restart: unless-stopped
    
volumes:
  postgres_data:
